openapi: 3.0.3
info:
  title: Urban Farming API
  version: 1.0.0
  description: API documentation for the Urban Farming backend.

servers:
  - url: http://localhost:5000
    description: Local development server

tags:
  - name: Health
  - name: Auth
  - name: Vendor
  - name: Certifications
  - name: Products
  - name: Rental Spaces
  - name: Orders
  - name: Community Posts

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Request successful

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Something went wrong

    RegisterRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: Pass1234
        role:
          type: string
          enum: [ADMIN, VENDOR, CUSTOMER]
          example: CUSTOMER

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: Pass1234

    VendorProfileRequest:
      type: object
      additionalProperties: true
      example:
        businessName: Green Farm Co.
        businessAddress: Dhaka, Bangladesh
        phone: "+8801700000000"

    CertificationRequest:
      type: object
      required: [certifyingAgency, certificationDate]
      properties:
        certifyingAgency:
          type: string
          example: Organic Certification Board
        certificationDate:
          type: string
          format: date
          example: 2026-04-18

    ProductRequest:
      type: object
      required: [name, description, price, category, availableQuantity]
      properties:
        name:
          type: string
          example: Organic Tomato
        description:
          type: string
          example: Fresh organic tomatoes.
        price:
          type: number
          example: 120
        category:
          type: string
          example: Vegetables
        availableQuantity:
          type: integer
          example: 50
        image:
          type: string
          nullable: true
          example: https://example.com/tomato.jpg

    RentalSpaceRequest:
      type: object
      required: [location, size, price]
      properties:
        location:
          type: string
          example: Uttara, Dhaka
        size:
          type: string
          example: 1200 sq ft
        price:
          type: number
          example: 15000
        description:
          type: string
          example: Rooftop farming space available for rent.

    OrderRequest:
      type: object
      required: [productId]
      properties:
        productId:
          type: string
          example: clx123productid
        quantity:
          type: integer
          example: 2

    CommunityPostRequest:
      type: object
      required: [postContent]
      properties:
        postContent:
          type: string
          example: Anyone selling organic compost this week?

paths:
  /:
    get:
      tags: [Health]
      summary: Check API status
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /db-test:
    get:
      tags: [Health]
      summary: Test database connection
      responses:
        '200':
          description: Database connected successfully
        '500':
          description: Database connection failed

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/vendor/profile:
    post:
      tags: [Vendor]
      summary: Create vendor profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorProfileRequest'
      responses:
        '201':
          description: Vendor profile created
        '401':
          description: Unauthorized

  /api/vendor/profile/me:
    get:
      tags: [Vendor]
      summary: Get my vendor profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Vendor profile returned
        '401':
          description: Unauthorized

  /api/certifications:
    post:
      tags: [Certifications]
      summary: Submit certification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificationRequest'
      responses:
        '201':
          description: Certification submitted
        '401':
          description: Unauthorized